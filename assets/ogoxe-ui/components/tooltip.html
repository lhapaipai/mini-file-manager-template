<div class="storybook-tooltips">
    <button aria-label="Hello world up" role="tooltip" data-tooltip-position="top">Tooltip on Top</button>
    <button aria-label="Hello world down" role="tooltip" data-tooltip-position="bottom">Tooltip on Bottom</button>
    <button aria-label="Hello world left" role="tooltip" data-tooltip-position="left">Tooltip on left</button>
    <button aria-label="Hello world right" role="tooltip" data-tooltip-position="right">Tooltip on right</button>
</div>
